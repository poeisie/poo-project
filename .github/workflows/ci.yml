name: CI — Arena Pernambuco

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:

  # ─────────────────────────────────────
  # JOB 1 — Build + Testes de Domínio
  # ─────────────────────────────────────
  build-and-test:
    name: Build e Testes de Domínio (TDD)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build + Testes unitários de domínio
        run: ./mvnw test --no-transfer-progress
        # Roda EventoTest — ciclo TDD sobre a invariante de capacidade
        # ⚠️ Teste vermelho = pipeline para aqui, deploy não acontece

      - name: Publicar relatório de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-testes
          path: target/surefire-reports/

  # ─────────────────────────────────────
  # JOB 2 — Empacotamento (JAR)
  # Só roda se os testes passarem
  # ─────────────────────────────────────
  package:
    name: Gerar JAR
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Gerar JAR (sem rodar testes novamente)
        run: ./mvnw package -DskipTests --no-transfer-progress

      - name: Guardar JAR como artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar