spring.application.name=vempraarena

# ===============================
# CONFIGURA«’ES DO BANCO DE DADOS
# ===============================
# A URL de conex„o. 'arenapernambuco' È o nome do banco que vamos criar.
# Se o seu Postgres rodar em outra porta, mude o 5432.
spring.datasource.url=jdbc:postgresql://localhost:5432/arenapernambuco
spring.datasource.username=postgres
spring.datasource.password=connorisadeviant
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CONFIGURA«’ES DO JPA / HIBERNATE
# ===============================
# O 'update' È m·gico: ele lÍ suas classes @Entity e cria as tabelas no banco automaticamente.
spring.jpa.hibernate.ddl-auto=update

# Mostra no console do Java os comandos SQL que o Spring est· executando (Ûtimo para debugar)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Ajusta o dialeto para o Spring falar a vers„o correta dos comandos SQL do Postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect