<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Arena Pernambuco - Home</title>
</head>
<body>
    
<h1>Bem-vindo(a), <span th:text="${nome}">Usuário</span>! 🎉</h1>

<div style="background-color: #f0f8ff; padding: 15px; border-radius: 8px;">
    <h3>Seu Saldo:</h3>
    <p><strong style="font-size: 1.5em; color: #ff8c00;" th:text="${saldo}">0</strong> moedas da Arena</p>
</div>

<form th:action="@{/logout}" method="post" style="margin-top: 20px;">
    <button type="submit">Sair</button>
</form>
</body>
</html>
