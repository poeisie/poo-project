<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/admin-dashboard-estatistico.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <meta charset="UTF-8">
    <title>VEM·PRA·ARENA. — Dashboard Arena</title>
</head>
<body>
    <div th:insert="fragments/navbar :: navbar"></div>
<div>
    <h3>Total de Eventos Confirmados</h3>
    <p th:text="${metricas.totalEventosConfirmados}">0</p>
</div>

<div>
    <h3>Total de Ingressos Vendidos</h3>
    <p th:text="${metricas.totalIngressosVendidos}">0</p>
</div>

<div>
    <h3>Receita Total</h3>
    <p th:text="${#numbers.formatDecimal(metricas.receitaTotal, 1, 'POINT', 2, 'COMMA')}">0,00</p>
</div>

<div>
    <h3>Média de Ingressos por Evento</h3>
    <p th:text="${#numbers.formatDecimal(metricas.mediaIngressosPorEvento, 1, 'POINT', 2, 'COMMA')}">0,00</p>
</div>

<div>
    <h3>Desvio Padrão de Ingressos</h3>
    <p th:text="${#numbers.formatDecimal(metricas.desvioPadraoIngressos, 1, 'POINT', 2, 'COMMA')}">0,00</p>
</div>

<div>
    <h3>Categoria Mais Frequente</h3>
    <p th:text="${metricas.modaCategoria}">Sem dados</p>
</div>
