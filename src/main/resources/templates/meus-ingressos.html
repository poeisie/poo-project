<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meus Ingressos</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/meus-ingressos.css" />
</head>
<body class="events-page">

<div class="events-container">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main">

  <div class="ingressos-container">

  <h1>Seus Ingressos</h1>

  <div class="sucesso" th:if="${sucesso}" th:text="${sucesso}"></div>

  <div class="ingressos-empty" th:if="${#lists.isEmpty(ingressos)}">
    <h3>Você ainda não comprou nenhum ingresso.</h3>
    <p>Vá até a aba de eventos e garanta o seu lugar!</p>
    <a th:href="@{/eventos/listar}">Explorar Eventos</a>
  </div>

  <div class="ingressos-grid" th:if="${!#lists.isEmpty(ingressos)}">

    <div class="ingresso-card" th:each="ingresso : ${ingressos}">

      <div class="ingresso-banner">
        <img src="/img/evento-padrao.jpg" alt="Banner do Evento">
      </div>

      <div class="ingresso-header">
        <span class="ingresso-pedido" th:text="'Pedido #' + ${ingresso.id}"></span>
        <span class="ingresso-mais">• • •</span>
      </div>

      <h2 class="ingresso-nome" th:text="${ingresso.evento.nome}">Nome do Evento</h2>

      <div class="ingresso-meta">
        <div class="ingresso-meta-item">
          <span th:text="${#temporals.format(ingresso.evento.data, 'dd/MM/yyyy')}"></span>
          <span th:text="${ingresso.evento.horario}"></span>
        </div>
        <div class="ingresso-meta-item">
          <span th:text="${ingresso.evento.local}"></span>
        </div>
      </div>

      <div class="ingresso-footer">

        <div class="ingresso-footer-esq">
          <p class="ingresso-qtd" th:text="${ingresso.quantidade} + ' Ingresso(s)'"></p>
          <div class="ingresso-acoes">
            <a th:href="@{/ingressos/{id}(id=${ingresso.id})}" class="acao-link acao-ver">VER PEDIDO</a>
            <a th:href="@{/ingressos/cancelar/{id}(id=${ingresso.id})}" class="acao-link">CANCELAR PEDIDO</a>
            <a th:href="@{/ingressos/transferir/{id}(id=${ingresso.id})}" class="acao-link">TRANSFERIR INGRESSO</a>
          </div>
        </div>

        <div class="ingresso-qr">
          <img src="/img/qrcode-padrao.png" alt="QR Code do Ingresso">
        </div>

      </div>

    </div>

  </div>

</div>

  </main>

</div>

</body>
</html>
