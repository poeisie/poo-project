<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Resumo da Compra - Arena</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/resumo-compra.css" />
</head>
<body class="events-page">

<div class="events-container">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main">

    <div class="compra-container">

      <div class="compra-resumo">

        <h1>Resumo da Compra</h1>

        <div class="resumo-evento">
          <h2 th:text="${evento.nome}">Nome do Evento</h2>
          <p>Dia: <span th:text="${#temporals.format(evento.data, 'dd/MM/yyyy')}"></span></p>
          <p>Horário: <span th:text="${evento.horario}"></span></p>
          <p>Local: <span th:text="${evento.local}"></span></p>
        </div>

        <div class="resumo-ingressos">
          <h2>Ingressos</h2>

          <div class="erro" th:if="${erroCompra}" th:text="${erroCompra}"></div>

          <div class="resumo-item" th:each="entry : ${evento.ingressosDisponiveisPorTipo}">
            <div class="resumo-item-info">
              <p class="resumo-item-tipo"
                 th:text="${entry.key == T(com.usforus.vempraarena.entities.TipoIngresso).INTEIRA} ? 'Inteira' : 'Meia Entrada'">
              </p>
              <p class="resumo-item-preco"
                 th:text="'R$ ' + (${entry.key == T(com.usforus.vempraarena.entities.TipoIngresso).INTEIRA} ? ${evento.precoIngresso} : ${evento.precoIngresso / 2})">
              </p>
              <p class="resumo-item-desc" th:text="${entry.value} + ' disponíveis'"></p>
            </div>
            <div class="resumo-item-qtd">
              <span th:text="${compraDto.quantidade}">1</span>
            </div>
          </div>

          <div class="resumo-total">
            <div class="resumo-item-info">
              <p class="resumo-item-tipo">Total</p>
              <p class="resumo-item-preco" id="valorTotal" th:text="'R$ ' + ${evento.precoIngresso}"></p>
            </div>
            <div class="resumo-item-qtd">
              <span th:text="${compraDto.quantidade}">1</span>
            </div>
          </div>
        </div>

      </div>

      <div class="compra-pagamento">

        <h1>Formas de Pagamento</h1>

        <div class="saldo-box">
          Seu saldo atual: <span class="saldo-positivo" th:text="${usuario.saldoMoedas} + ' moedas'"></span>
        </div>

        <form th:action="@{/ingressos/comprar}" th:object="${compraDto}" method="post">
          <input type="hidden" th:field="*{eventoId}" />
          <input type="hidden" th:field="*{tipoIngresso}" />
          <input type="hidden" th:field="*{quantidade}" />

          <div class="pagamento-secao">
            <h3>Pré-Cadastradas</h3>

            <label class="pagamento-opcao">
              <div class="pagamento-info">
                <p class="pagamento-nome">Cartão Principal</p>
                <p class="pagamento-detalhe">Cartão Crédito Mastercard 0555</p>
              </div>
              <input type="radio" th:field="*{formaPagamento}" value="CARTAO_PRINCIPAL" />
            </label>

            <label class="pagamento-opcao">
              <div class="pagamento-info">
                <p class="pagamento-nome">Cartão Apelido</p>
                <p class="pagamento-detalhe">Cartão Débito Visa 1097</p>
              </div>
              <input type="radio" th:field="*{formaPagamento}" value="CARTAO_APELIDO" />
            </label>

            <a href="#" class="pagamento-novo">+ Cadastrar Novo Cartão</a>
          </div>

          <div class="pagamento-secao">
            <h3>Outras formas</h3>

            <label class="pagamento-opcao">
              <div class="pagamento-info">
                <p class="pagamento-nome">Pix</p>
              </div>
              <input type="radio" th:field="*{formaPagamento}" value="PIX" />
            </label>

            <label class="pagamento-opcao">
              <div class="pagamento-info">
                <p class="pagamento-nome">Boleto</p>
              </div>
              <input type="radio" th:field="*{formaPagamento}" value="BOLETO" />
            </label>

            <label class="pagamento-opcao">
              <div class="pagamento-info">
                <p class="pagamento-nome">Arena Coin</p>
                <p class="pagamento-detalhe saldo-positivo" th:text="'R$ ' + ${usuario.saldoMoedas}"></p>
              </div>
              <input type="radio" th:field="*{formaPagamento}" value="ARENA_COIN" />
            </label>
          </div>

          <button type="submit">Finalizar Compra</button>

        </form>

        <div style="text-align: center; margin-top: 15px;">
          <a th:href="@{/eventos}">Cancelar</a>
        </div>

      </div>

    </div>

  </main>

</div>

<script>
  function atualizarTotal() {
    let precoBase = parseInt(document.getElementById('precoUnitario').innerText);
    let qtd = parseInt(document.getElementById('qtd').value);
    let tipo = document.getElementById('tipoIngresso').value;
    if (!isNaN(precoBase) && !isNaN(qtd)) {
      let precoReal = tipo === 'MEIA' ? Math.floor(precoBase / 2) : precoBase;
      document.getElementById('valorTotal').innerText = 'R$ ' + (precoReal * qtd).toString();
    }
  }
</script>

</body>
</html>
