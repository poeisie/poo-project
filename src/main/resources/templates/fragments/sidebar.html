<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">
<body>

<aside th:fragment="sidebar" class="sidebar">
    <button class="sidebar-toggle-btn">«</button>

    <div class="sidebar-profile-wrapper">
        <div class="sidebar-profile">
            <div class="sidebar-avatar">👤</div>
            <div class="sidebar-profile-info">
                <div class="name" th:text="${#authentication?.name ?: 'Nome Sobrenome'}">Nome Sobrenome</div>
                <div class="email">email@email.com</div>
            </div>
        </div>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-section-header" onclick="toggleSection(this)">
            Funcionalidades <span class="arrow">▾</span>
        </div>
        <div class="sidebar-section-links">
            <a th:href="@{/eventos/listar}">Eventos</a>
            <a th:href="@{/ingressos/meus}">Meus Ingressos</a>
        </div>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-section-header" onclick="toggleSection(this)">
            Configurações <span class="arrow">▾</span>
        </div>
        <div class="sidebar-section-links">
            <a th:href="@{/conta}">Configurações da conta</a>
            <a th:href="@{/notificacoes}">Notificações</a>
        </div>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-section-header" onclick="toggleSection(this)">
            Legal <span class="arrow">▾</span>
        </div>
        <div class="sidebar-section-links">
            <a th:href="@{/termos}">Termos de uso</a>
            <a th:href="@{/privacidade}">Política de privacidade</a>
        </div>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-section-header" onclick="toggleSection(this)">
            Suporte <span class="arrow">▾</span>
        </div>
        <div class="sidebar-section-links">
            <a th:href="@{/faq}">Central de ajuda/FAQ</a>
            <a th:href="@{/contato}">Fale Conosco</a>
        </div>
    </div>

<script th:src="@{/js/sidebar.js}"></script>

</aside>

</body>
</html>
