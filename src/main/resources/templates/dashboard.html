<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/dashboard.css"> 
    <meta charset="UTF-8">
    <title>VEM·PRA·ARENA. — Dashboard Arena</title>
</head>
<body>
    <div th:insert="layout/navbar :: navbar(~{layout/navbar :: dashboardActions})"></div>
        
    <div class="dashboard-page">
        <div class="management-card">
            <div class="card-image-wrapper">
                <img src="/images/estádio-cinza-img-cortada.png" alt="Estádio" class="card-stadium-image">
            </div>

            <h2 style="font-family: 'Sizmo', sans-serif !important;">GERENCIE SUA PRODUÇÃO</h2>
            <p class="card-description">
                Tudo certo por aqui! Agora é só gerenciar<br>
                seus eventos e soltar a criatividade. A<br>
                produção espera por você.
            </p>

            <div class="card-spacing"></div>
        
            <div class="card-actions">
                <a th:href="@{/eventos/criar}" class="btn-nav green">+ Criar novos eventos</a>
                <a th:href="@{/produtor/meus-eventos}" class="btn-nav blue">Meus Eventos</a>
            </div>
        </div> 
    </div>
</body>
</html>
