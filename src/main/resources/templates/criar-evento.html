<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Novo Evento - Arena Pernambuco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/criar-eventos.css">
</head>
<body class="events-page criar-evento-page">

<div class="events-container">

    <div th:insert="~{fragments/navbar :: navbar}"></div>

  <main class="main criar-evento-main">
    <div class="criar-evento-inner">

      <a th:href="@{/eventos/listar}" class="back-link">
        <span aria-hidden="true">«</span>
        Voltar para <strong>Tela Principal</strong>
      </a>

      <div class="card">
        <h1 class="page-title">CRIAR NOVO EVENTO</h1>

        <div class="erro-msg" th:if="${erroEvento}" th:text="${erroEvento}"></div>

        <form class="form criar-evento-form"
              th:action="@{/eventos/criar}"
              th:object="${EventoDTO}"
              method="post"
              enctype="multipart/form-data">

          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

          <div class="row">
            <div class="field">
              <label for="nome">Nome do Evento</label>
              <input type="text" id="nome" th:field="*{nome}"
                     placeholder="Ex: Nome do Evento - Primeira Edição" />
            </div>
            <div class="field">
              <label for="local">Local do Evento</label>
              <div class="select-wrap">
                <select id="local" th:field="*{local}">
                  <option value="" disabled selected>Selecionar local...</option>
                  <option value="Arena Pernambuco - Sala 001">Arena Pernambuco - Sala 001</option>
                  <option value="Arena Pernambuco - Sala 002">Arena Pernambuco - Sala 002</option>
                  <option value="Arena Pernambuco - Sala 003">Arena Pernambuco - Sala 003</option>
                  <option value="Arena Pernambuco - Auditório Principal">Arena Pernambuco - Auditório Principal</option>
                </select>
                <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M6 9l6 6 6-6"/>
                </svg>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label for="data">Data do Evento</label>
              <div class="input-wrap">
                <input type="date" id="data" th:field="*{data}" />
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                  <rect x="3" y="4" width="18" height="18" rx="2"/>
                  <path d="M16 2v4M8 2v4M3 10h18"/>
                </svg>
              </div>
            </div>
            <div class="field">
              <label for="horario">Horário</label>
              <div class="input-wrap">
                <input type="time" id="horario" th:field="*{horario}" />
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                  <circle cx="12" cy="12" r="9"/>
                  <path d="M12 7v5l3 2"/>
                </svg>
              </div>
            </div>
          </div>

          <div class="field full">
            <label for="categorias">Categorias</label>
            <div class="categorias-input-wrapper" id="categorias-wrapper">
              <select id="categorias" onchange="adicionarCategoria(this)">
                <option value="">Selecionar categoria...</option>
                <option value="Tecnologia">Tecnologia</option>
                <option value="E-sports">E-sports</option>
                <option value="Workshop">Workshop</option>
                <option value="Hackathon">Hackathon</option>
                <option value="Show">Show</option>
                <option value="Palestra">Palestra</option>
                <option value="Visita">Visita Arena</option>
              </select>
              <svg class="chevron categorias-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M6 9l6 6 6-6"/>
              </svg>
            </div>
            <div id="categorias-hidden"></div>
          </div>

          <div class="row">
            <div class="field">
              <label for="ingressosInteira">Quantidade de Ingressos (Inteira)</label>
              <input type="number" id="ingressosInteira"
                     th:field="*{ingressosDisponiveisPorTipo['INTEIRA']}"
                     placeholder="Ex: 600" min="0" required />
            </div>
            <div class="field">
              <label for="ingressosMeia">Quantidade de Ingressos (Meia-Entrada)</label>
              <input type="number" id="ingressosMeia"
                     th:field="*{ingressosDisponiveisPorTipo['MEIA']}"
                     placeholder="Ex: 400" min="0" required />
            </div>
          </div>

          <div class="field full">
            <label for="precoIngresso">Preço do Ingresso (Inteira)</label>
            <input type="number" id="precoIngresso" th:field="*{precoIngresso}"
                   placeholder="Ex: 100" min="0" required
                   oninput="updateMeia(this.value)" />
            <p class="helper" id="meia-info">Meia entrada: —</p>
          </div>

          <div class="field full">
            <label for="descricao">Descrição Completa</label>
            <div class="textarea-block">
              <textarea id="descricao" th:field="*{descricao}" maxlength="2000"
                        placeholder="Descreva seu evento com detalhes para compreensão do público..."
                        oninput="updateCounter(this, 'char-count')"></textarea>
              <span class="char-count">Máx.: 2000 / <span id="char-count">0</span></span>
            </div>
          </div>

          <div class="field full">
            <label for="sobreProdutor">Sobre o Produtor</label>
            <textarea id="sobreProdutor" class="medium" th:field="*{sobreProdutor}" maxlength="2000"
                      placeholder="Faça uma breve descrição sobre você e seu histórico que será exibida ao público..."
                      oninput="updateCounter(this, 'char-count-produtor')"></textarea>
            <span class="char-count char-count--below">Máx.: 2000 / <span id="char-count-produtor">0</span></span>
          </div>

          <div class="field full">
            <label for="imagem">Imagem do Evento</label>
            <div class="file-row">
              <button type="button" class="file-btn" onclick="document.getElementById('imagem').click()">Escolher arquivo</button>
              <span class="file-name" id="file-name">Nenhum arquivo escolhido</span>
              <input type="file" id="imagem" name="imagem" class="file-input-hidden" accept="image/*"
                     onchange="updateFileName(this)" />
            </div>
            <p class="helper">Recomendado: 1200x600px. Máx. 5MB.</p>
          </div>

          <button type="submit" class="submit">Criar novo evento</button>
        </form>
      </div>
    </div>
  </main>
</div>

<script>
  function updateCounter(textarea, spanId) {
    document.getElementById(spanId).textContent = textarea.value.length;
  }

  function updateMeia(value) {
    const span = document.getElementById('meia-info');
    const num = parseFloat(value);
    if (!isNaN(num) && num > 0) {
      const meia = (num / 2).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      span.textContent = 'Meia entrada: ' + meia + ' (50% da inteira)';
      span.style.color = '#16a34a';
    } else {
      span.textContent = 'Meia entrada: —';
      span.style.color = '#64748b';
    }
  }

  function updateFileName(input) {
    const label = document.getElementById('file-name');
    if (input.files && input.files.length > 0) {
      label.textContent = input.files[0].name;
      label.classList.add('has-file');
    } else {
      label.textContent = 'Nenhum arquivo escolhido';
      label.classList.remove('has-file');
    }
  }

  function adicionarCategoria(select) {
    const valor = select.value;
    if (!valor) return;

    const existingTag = document.querySelector('.cat-tag');
    if (existingTag) existingTag.remove();

    const hiddenContainer = document.getElementById('categorias-hidden');
    hiddenContainer.innerHTML = '';

    const tag = document.createElement('span');
    tag.className = 'cat-tag azul';
    tag.dataset.valor = valor;
    tag.innerHTML = valor + ' <span class="cat-tag-remove" onclick="removerCategoria(this)">×</span>';

    const hidden = document.createElement('input');
    hidden.type = 'hidden';
    hidden.name = 'categorias';
    hidden.value = valor;
    hidden.id = 'hidden-cat';
    hiddenContainer.appendChild(hidden);

    const wrapper = document.getElementById('categorias-wrapper');
    const selectEl = document.getElementById('categorias');
    wrapper.insertBefore(tag, selectEl);
    selectEl.value = '';
    selectEl.style.display = 'none';
    selectEl.disabled = true;
    wrapper.querySelector('.categorias-chevron')?.classList.add('is-hidden');
  }

  function removerCategoria(btnOrElem) {
    let tag;
    if (btnOrElem instanceof Element && btnOrElem.classList.contains('cat-tag')) {
      tag = btnOrElem;
    } else if (btnOrElem instanceof Element) {
      tag = btnOrElem.closest('.cat-tag');
    }
    if (tag) tag.remove();

    const hidden = document.getElementById('hidden-cat');
    if (hidden) hidden.remove();

    const selectEl = document.getElementById('categorias');
    selectEl.style.display = '';
    selectEl.disabled = false;
    document.querySelector('.categorias-chevron')?.classList.remove('is-hidden');
  }

  document.addEventListener('DOMContentLoaded', function () {
    const descricao = document.getElementById('descricao');
    const produtor = document.getElementById('sobreProdutor');
    if (descricao && descricao.value) updateCounter(descricao, 'char-count');
    if (produtor && produtor.value) updateCounter(produtor, 'char-count-produtor');
    const preco = document.getElementById('precoIngresso');
    if (preco && preco.value) updateMeia(preco.value);
  });
</script>

</body>
</html>
