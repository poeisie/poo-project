<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">
<head>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/criar-eventos.css">
    <meta charset="UTF-8">
    <title>Criar Novo Evento - Arena Pernambuco</title>
</head>
<body class="events-page">

<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

<main class="main">

    <a th:href="@{/eventos/listar}" class="voltar-link">
        <span class="voltar-arrow">«</span> Voltar para <strong>Tela Principal</strong>
    </a>

    <div class="form-container">
        <h2>Criar Novo Evento</h2>

        <div class="erro-msg" th:if="${erroEvento}" th:text="${erroEvento}"></div>

        <form th:action="@{/eventos/criar}" th:object="${EventoDTO}" method="post">

            <div class="form-group">
                <label for="nome">Nome do Evento</label>
                <input type="text" id="nome" th:field="*{nome}"
                       placeholder="Ex: Nome do Evento - Primeira Edição" />
            </div>

            <div class="form-group">
                <label for="local">Local do Evento</label>
                <select id="local" th:field="*{local}">
                    <option value="">Arena Pernambuco - Sala 001</option>
                    <option value="sala2">Arena Pernambuco - Sala 002</option>
                    <option value="sala3">Arena Pernambuco - Sala 003</option>
                    <option value="auditorio">Arena Pernambuco - Auditório Principal</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="data">Data do Evento</label>
                    <input type="date" id="data" th:field="*{data}" />
                </div>
                <div class="form-group">
                    <label for="horario">Horário</label>
                    <input type="time" id="horario" th:field="*{horario}" />
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="categorias">Categorias</label>
                    <div class="categorias-input-wrapper">
                        <span class="cat-tag verde">Palestra</span>
                        <span class="cat-tag azul">Tecnologia</span>
                        <select id="categorias" th:field="*{categorias}">
                            <option value="Tecnologia">Tecnologia</option>
                            <option value="E-sports">E-sports</option>
                            <option value="Workshop">Workshop</option>
                            <option value="Hackathon">Hackathon</option>
                            <option value="Show">Show</option>
                            <option value="Palestra">Palestra</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="capacidadeInteira">Ingressos disponíveis - Inteira</label>
                    <input type="number" id="capacidadeInteira" name="ingressosDisponiveisPorTipo['INTEIRA']" class="form-control" required min="0" />
                </div>
                <div class="form-group">
                    <label for="capacidadeMeia">Ingressos disponíveis - Meia-entrada</label>
                    <input type="number" id="capacidadeMeia" name="ingressosDisponiveisPorTipo['MEIA_ENTRADA']" class="form-control" required min="0" />
                </div>
            </div>

            <div class="form-group">
                <label for="descricao">Descrição Completa</label>
                <textarea id="descricao" th:field="*{descricao}" rows="6" maxlength="2000"
                          placeholder="Descreva seu evento com detalhes para compreensão do público..."
                          oninput="updateCounter(this)"></textarea>
                <div class="textarea-counter">Máx.: 2000/<span id="char-count">0</span></div>
            </div>

            <button type="submit" class="btn-submit">Criar novo evento</button>

        </form>
    </div>

</main>

<script>
    function updateCounter(textarea) {
        document.getElementById('char-count').textContent = textarea.value.length;
    }
</script>

</body>
</html>
