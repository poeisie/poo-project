<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/cadastro-cpf.css">
<title>Cadastro Produtor CPF - Arena Pernambuco</title>
</head>
<body>
<div class="cadastro-page">
  <div class="cadastro-container">
    <h2 class="cadastro-title">Crie sua conta</h2>
    <h2 class="cadastro-title">Pessoa física</h2>

    <div th:if="${erroDuplicidade}" class="error">
      <span th:text="${erroDuplicidade}"></span>
      <a th:href="@{/login}">Fazer login</a>
    </div>

    <form th:action="@{/cadastro}" th:object="${usuarioCadastroDTO}" method="post" enctype="multipart/form-data">

      <div>
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" th:field="*{cpf}" placeholder="Nome Sobrenome" th:classappend="${#fields.hasErrors('cpf')} ? 'input-error' : ''" />
        <span class="error" th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></span>
      </div>

      <div>
        <label for="dataNascimento">Data de Nascimento</label>
        <input type="date" id="dataNascimento" th:field="*{dataNascimento}" th:classappend="${#fields.hasErrors('dataNascimento')} ? 'input-error' : ''" />
        <span class="error" th:if="${#fields.hasErrors('dataNascimento')}" th:errors="*{dataNascimento}"></span>
      </div>

      <div>
        <label for="telefone">Telefone Celular</label>
        <input type="tel" id="telefone" th:field="*{telefone}" placeholder="(81) 90000 - 0000" th:classappend="${#fields.hasErrors('telefone')} ? 'input-error' : ''" />
        <span class="error" th:if="${#fields.hasErrors('telefone')}" th:errors="*{telefone}"></span>
      </div>

      <div>
        <label for="rua">Rua, Avenida, Endereço</label>
        <label for="numero">Número</label>
        <input type="text" id="rua" th:field="*{rua}" placeholder="Rua" th:classappend="${#fields.hasErrors('rua')} ? 'input-error' : ''" />
        <input type="text" id="numero" th:field="*{numero}" placeholder="N.º" th:classappend="${#fields.hasErrors('numero')} ? 'input-error' : ''" />
        <span class="error" th:if="${#fields.hasErrors('rua')}" th:errors="*{rua}"></span>
        <span class="error" th:if="${#fields.hasErrors('numero')}" th:errors="*{numero}"></span>
      </div>

      <div>
        <label for="complemento">Complemento</label>
        <label for="bairro">Bairro</label>
        <input type="text" id="complemento" th:field="*{complemento}" placeholder="Apto, Casa, Bloco" />
        <input type="text" id="bairro" th:field="*{bairro}" placeholder="Bairro" th:classappend="${#fields.hasErrors('bairro')} ? 'input-error' : ''" />
        <span class="error" th:if="${#fields.hasErrors('bairro')}" th:errors="*{bairro}"></span>
      </div>

      <div>
        <label for="cep">CEP</label>
        <label for="cidade">Cidade</label>
        <label for="uf">UF</label>
        <input type="text" id="cep" th:field="*{cep}" placeholder="00000-000" th:classappend="${#fields.hasErrors('cep')} ? 'input-error' : ''" />
        <select id="cidade" th:field="*{cidade}" th:classappend="${#fields.hasErrors('cidade')} ? 'input-error' : ''">
          <option value="" disabled selected></option>
        </select>
        <select id="uf" th:field="*{uf}" th:classappend="${#fields.hasErrors('uf')} ? 'input-error' : ''">
          <option value="" disabled selected></option>
        </select>
        <span class="error" th:if="${#fields.hasErrors('cep')}" th:errors="*{cep}"></span>
        <span class="error" th:if="${#fields.hasErrors('cidade')}" th:errors="*{cidade}"></span>
        <span class="error" th:if="${#fields.hasErrors('uf')}" th:errors="*{uf}"></span>
      </div>

      <div>
        <label>Foto Documento (RG/CPF)</label>
        <input type="file" id="fotoFrente" name="fotoFrente" accept="image/*" />
        <label for="fotoFrente">Frente</label>
        <input type="file" id="fotoVerso" name="fotoVerso" accept="image/*" />
        <label for="fotoVerso">Verso</label>
      </div>

      <button type="submit">Criar conta Produtor</button>

    </form>
  </div>
</div>
</body>
</html>
