<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Explorar Eventos - Arena Pernambuco</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/listar-eventos.css">
</head>
<body class="events-page">
<div class="events-container">
    <div class="events-header">
        <h1>🗓️ Eventos na Arena</h1>
        <a sec:authorize="hasAuthority('ADMIN')" th:href="@{/eventos/novo}" class="btn-primary btn-criar">+ Criar Evento</a>
    </div>

    <div class="events-grid">

        <div class="card" th:each="evento : ${eventos}">
            <span class="categoria-badge" th:text="${evento.categorias}">Categoria</span>
        <h2 class="titulo" th:text="${evento.nome}">Título do Evento</h2>

        <div class="info-linha data-destaque">
            📅 <span th:text="${#temporals.format(evento.data, 'dd/MM/yyyy')}"></span>
            ⏰ <span th:text="${evento.horario}"></span>
        </div>

        <div class="info-linha">
            🎟️ <strong>Vagas:</strong> <span th:text="${evento.capacidadeMaximaParticipantes}"></span> pessoas
        </div>

        <div class="descricao" th:text="${evento.descricao}">Descrição curtinha aqui...</div>
    </div>

</div>

<div class="empty-state" th:if="${#lists.isEmpty(eventos)}">
    <h2>Nenhum evento programado 😢</h2>
    <p>Ainda não temos eventos confirmados. Fique de olho, em breve novidades!</p>
</div>

</div>
</body>
</html>
