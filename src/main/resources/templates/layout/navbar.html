<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<body>
    <th:block th:fragment="navbar(actionButtons)">
        <nav class="navbar">
            <a th:href="@{/home}" class="navbar-logo"></a>
            <div class="navbar-actions">
                <div th:replace="${actionButtons}"></div>
            </div>
        </nav>
    </th:block>

    <th:block th:fragment="dashboardActions">
        <a th:href="@{/home}" class="btn-nav blue">Voltar Área Comum</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-nav white outline">Sair</button>
        </form>
        <span class="user-avatar" th:text="${usuarioLogado != null ? usuarioLogado.initiais : ''}"></span>
    </th:block>

    <th:block th:fragment="produtorActions">
        <a th:href="@{/produtor/dashboard}" class="btn-nav green">+ Criar novos eventos</a>
        <a th:href="@{/produtor/meus-eventos}" class="btn-nav blue">Meus Eventos</a> 
        <a th:href="@{/home}" class="btn-nav blue">Voltar Área Comum</a> 
        <form th:action="@{/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-nav white outline">Sair</button>
        </form>
        <span class="user-avatar" th:text="${usuarioLogado != null ? usuarioLogado.initiais : ''}"></span>
    </th:block>
</body>
</html>
